<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>熊猫词语消消乐 - 欢乐背景音乐版</title>
    <!-- 引入 Howler.js 音频库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #2b6e9f 0%, #1e4a6e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Noto Sans Thai', 'Sukhumvit Set', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255,248,225,0.95);
            border-radius: 80px 80px 60px 60px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3), inset 0 1px 4px rgba(255,255,200,0.8);
            overflow: hidden;
            padding: 20px 25px 35px;
            position: relative;
        }

        .panda-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f5e7d3;
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 20px;
            box-shadow: 0 5px 0 #c29b6b;
            flex-wrap: wrap;
            gap: 12px;
        }

        .score-pandas {
            background: #3e2a1f;
            padding: 8px 20px;
            border-radius: 50px;
            color: #ffefb9;
            font-weight: bold;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .score-pandas span:first-child {
            background: #f7b05e;
            padding: 5px 12px;
            border-radius: 30px;
            color: #2c1a0c;
        }

        .panda-icons {
            font-size: 1.8rem;
            letter-spacing: 4px;
            line-height: 1;
        }

        .score-number {
            font-size: 1.6rem;
            font-weight: bold;
            background: #ffd966;
            padding: 4px 12px;
            border-radius: 40px;
            color: #3e2a1f;
            min-width: 70px;
            text-align: center;
        }

        .timer-box {
            background: #1f3e48;
            padding: 8px 20px;
            border-radius: 50px;
            color: #fdd67a;
            font-weight: bold;
            font-size: 1.8rem;
            font-family: monospace;
            box-shadow: inset 0 -2px 0 #0e2a32, 0 4px 8px rgba(0,0,0,0.2);
        }

        .timer-box span {
            font-size: 1rem;
            background: #ffb347;
            padding: 4px 10px;
            border-radius: 30px;
            color: #1f3e48;
            margin-right: 10px;
        }

        .guide-bilingual {
            background: #fffaec;
            border-left: 15px solid #f9a26c;
            padding: 12px 20px;
            margin: 15px 0 20px;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .guide-item {
            margin: 5px 0;
        }
        .guide-cn {
            font-size: 1.1rem;
            font-weight: bold;
            color: #b45116;
        }
        .guide-th {
            font-size: 1rem;
            color: #3e2a1f;
            margin-left: 10px;
        }

        .cards-section {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin: 15px 0 10px;
        }

        .card-column {
            flex: 1;
            min-width: 250px;
            background: #efe2c9;
            border-radius: 48px;
            padding: 20px 12px;
            box-shadow: inset 0 0 0 3px #fff6e5, 0 12px 18px rgba(0,0,0,0.1);
        }

        .card-column h3 {
            text-align: center;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 18px;
            color: #6b3f1c;
            background: #ffdd99;
            display: inline-block;
            width: auto;
            padding: 5px 20px;
            border-radius: 40px;
        }

        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
        }

        .card {
            width: 110px;
            height: 120px;
            background: white;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 8px 0 #ba8b4a;
            cursor: pointer;
            transition: 0.1s linear;
            text-align: center;
            padding: 10px 5px;
            position: relative;
            background: #fffef7;
            border: 2px solid #fbcb7b;
        }

        .card.selected {
            background: #ffe2a4;
            transform: scale(0.97);
            box-shadow: 0 3px 0 #ba8b4a;
            border: 3px solid #ff9f3d;
        }

        .shake {
            animation: shakeCard 0.3s ease-in-out 0s 2;
        }

        @keyframes shakeCard {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

        .cross-mark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: #e11;
            text-shadow: 2px 2px 0 white;
            background: rgba(255,255,240,0.9);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 28px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        .card.removed {
            display: none;
        }

        .button-area {
            display: flex;
            justify-content: center;
            margin-top: 25px;
        }

        .btn-start {
            background: #ffaa55;
            border: none;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 12px 35px;
            border-radius: 60px;
            color: #382008;
            cursor: pointer;
            box-shadow: 0 6px 0 #b4621a;
            transition: 0.08s linear;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .btn-start:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b4621a;
        }

        .message-area {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #efe0c9;
            border-radius: 40px;
            padding: 10px;
            color: #ad5f2a;
        }

        /* 胜利弹窗 */
        .win-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.2);
            background: linear-gradient(145deg, #ffdd88, #ffaa33);
            color: #d6341e;
            font-size: 4rem;
            font-weight: bold;
            padding: 30px 50px;
            border-radius: 80px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3), 0 0 0 8px #fff3bf;
            z-index: 1000;
            text-align: center;
            white-space: nowrap;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.34, 1.3, 0.55, 1), opacity 0.2s;
        }
        .win-toast.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        .win-toast span {
            display: block;
            font-size: 1.5rem;
            color: #fff2c9;
            text-shadow: 2px 2px 0 #b45116;
        }

        @media (max-width: 750px) {
            .card { width: 85px; height: 95px; font-size: 0.9rem; }
            .game-container { padding: 12px; }
            .score-pandas { font-size: 1rem; }
            .score-number { font-size: 1.2rem; min-width: 50px; }
            .timer-box { font-size: 1.3rem; padding: 4px 12px; }
            .win-toast { font-size: 2.5rem; padding: 20px 35px; white-space: nowrap; }
            .win-toast span { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="panda-header">
        <div class="score-pandas">
            <span>🐼 分数</span>
            <div class="panda-icons" id="pandaScoreIcons"></div>
            <div class="score-number" id="scoreNumber">0</div>
        </div>
        <div class="timer-box">
            <span>⏱️ เวลา</span> <span id="timerDisplay">60</span> วินาที
        </div>
    </div>

    <div class="guide-bilingual">
        <div class="guide-item">
            <div class="guide-cn">🎋 游戏规则：先点击中文词，再点击对应的泰语词，配对成功得分！🎋</div>
            <div class="guide-th">📌 กติกา: คลิกคำศัพท์ภาษาจีนก่อน แล้วคลิกคำแปลภาษาไทยที่ตรงกัน จับคู่ถูกได้คะแนน!</div>
        </div>
        <div class="guide-item">
            <div class="guide-cn">🐼 每对加10分，限时内配对全部词语即胜利！</div>
            <div class="guide-th">🐼 จับคู่ถูกได้ 10 คะแนน จับคู่ให้ครบก่อนเวลาหมด!</div>
        </div>
    </div>

    <div class="cards-section">
        <div class="card-column">
            <h3>🇨🇳 汉语词</h3>
            <div id="chineseCardsGrid" class="cards-grid"></div>
        </div>
        <div class="card-column">
            <h3>🇹🇭 คำไทย</h3>
            <div id="thaiCardsGrid" class="cards-grid"></div>
        </div>
    </div>

    <div class="button-area">
        <button class="btn-start" id="startGameBtn">🐼 เริ่มเกม / 开始游戏 🎋</button>
    </div>
    <div id="messageBox" class="message-area">✨ กดปุ่มเริ่มเกม เพื่อเริ่มจับคู่! ✨</div>
</div>

<div id="winToast" class="win-toast">
    🎉 你真棒！ 🎉
    <span>👍 เก่งมาก! 👍</span>
</div>

<script>
    // ========== 教师可修改倒计时秒数 ==========
    let initialTime = 60;   // 修改此数字即可调整倒计时（单位：秒）
    // =======================================

    // 词库（中文 — 泰语）
    const WORDS = [
        { id: 0, chinese: "有", thai: "มี" },
        { id: 1, chinese: "翅膀", thai: "ปีก" },
        { id: 2, chinese: "尾巴", thai: "หาง" },
        { id: 3, chinese: "耳朵", thai: "หู" },
        { id: 4, chinese: "鼻子", thai: "จมูก" },
        { id: 5, chinese: "眼睛", thai: "ตา" },
        { id: 6, chinese: "脚", thai: "เท้า" }
    ];
    const TOTAL_PAIRS = WORDS.length;

    // 游戏状态变量
    let gameActive = false;
    let currentScore = 0;
    let pairedCount = 0;
    let timeLeft = initialTime;
    let timerInterval = null;
    let selectedCard = null;
    let selectedCardType = null;
    let selectedWordId = null;

    // 音频对象
    let bgm = null;
    let winVoice = null;
    let bgmStarted = false;
    let audioCtx = null;
    let audioEnabled = false;

    // DOM 元素
    const chineseGrid = document.getElementById('chineseCardsGrid');
    const thaiGrid = document.getElementById('thaiCardsGrid');
    const startBtn = document.getElementById('startGameBtn');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const pandaIconsDiv = document.getElementById('pandaScoreIcons');
    const scoreNumberSpan = document.getElementById('scoreNumber');
    const messageBox = document.getElementById('messageBox');
    const winToast = document.getElementById('winToast');

    // ---------- 音效（配对成功，使用 Web Audio 合成热烈音效）----------
    function enableAudio() {
        if (audioCtx && audioEnabled) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // 播放一个极短静音来激活
            const buffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start();
            audioCtx.resume().then(() => {
                audioEnabled = true;
                console.log("音频已激活");
            }).catch(e => console.log);
        } catch(e) { console.log("Web Audio 不支持"); }
    }

    function playSuccessSound() {
        if (!audioEnabled || !audioCtx) return;
        try {
            const now = audioCtx.currentTime;
            const freqs = [523.25, 659.25, 783.99, 1046.50]; // C E G C
            freqs.forEach((freq, idx) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.value = 0.2;
                osc.start(now + idx * 0.12);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + idx * 0.12 + 0.3);
                osc.stop(now + idx * 0.12 + 0.3);
            });
        } catch(e) { console.log("音效出错"); }
    }

    // ---------- 背景音乐和胜利语音（外部文件）----------
    function initAudioFiles() {
        // 背景音乐（循环播放）
        bgm = new Howl({
            src: ['sounds/bgm.mp3'],
            loop: true,
            volume: 0.4,
            preload: true,
            onloaderror: () => console.warn('⚠️ 背景音乐加载失败，请确保 sounds/bgm.mp3 存在')
        });
        // 胜利语音（自定义女声“你真棒”）
        winVoice = new Howl({
            src: ['sounds/win.mp3'],
            volume: 0.8,
            preload: true,
            onloaderror: () => console.warn('⚠️ 胜利语音加载失败，请确保 sounds/win.mp3 存在')
        });
    }

    // 播放背景音乐（由开始按钮触发）
    function startBackgroundMusic() {
        if (!bgmStarted && bgm) {
            bgm.play();
            bgmStarted = true;
        }
    }

    // 播放胜利语音
    function playWinVoice() {
        if (winVoice) {
            winVoice.play();
        } else {
            console.warn("胜利语音未加载");
        }
    }

    // ---------- 游戏核心函数 ----------
    function updateScoreDisplay() {
        const pandaCount = Math.floor(currentScore / 10);
        let pandaStr = '';
        for (let i = 0; i < pandaCount; i++) pandaStr += '🐼';
        if (pandaStr === '') pandaStr = '🐾';
        pandaIconsDiv.innerHTML = pandaStr;
        scoreNumberSpan.innerText = currentScore;
    }

    function addScore(inc = 10) {
        currentScore += inc;
        updateScoreDisplay();
    }

    function showWinToast() {
        winToast.classList.remove('show');
        void winToast.offsetWidth;
        winToast.classList.add('show');
        setTimeout(() => {
            winToast.classList.remove('show');
        }, 4000);
    }

    function checkGameComplete() {
        if (pairedCount === TOTAL_PAIRS && gameActive) {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            // 播放胜利语音和弹窗
            playWinVoice();
            showWinToast();
            messageBox.innerHTML = "🎉👍 ยอดเยี่ยม! คุณชนะแล้ว! 👍🎉<br>🎉👍 你真棒！胜利啦！👍🎉";
        }
    }

    function handleMatch(cardA, cardB, wordId) {
        if (!gameActive) return false;
        if (cardA.classList.contains('removed') || cardB.classList.contains('removed')) return false;
        cardA.classList.add('removed');
        cardB.classList.add('removed');
        if (selectedCard) {
            selectedCard.classList.remove('selected');
            selectedCard = null;
            selectedCardType = null;
            selectedWordId = null;
        }
        pairedCount++;
        addScore(10);
        playSuccessSound();    // 配对成功音效
        checkGameComplete();
        return true;
    }

    function showCrossAndShake(cardElement) {
        if (!cardElement) return;
        cardElement.classList.add('shake');
        const crossDiv = document.createElement('div');
        crossDiv.className = 'cross-mark';
        crossDiv.innerText = '✘';
        cardElement.style.position = 'relative';
        cardElement.appendChild(crossDiv);
        setTimeout(() => {
            cardElement.classList.remove('shake');
            if (crossDiv && crossDiv.parentNode) crossDiv.remove();
        }, 1000);
    }

    function clearSelected() {
        if (selectedCard) {
            selectedCard.classList.remove('selected');
            selectedCard = null;
            selectedCardType = null;
            selectedWordId = null;
        }
    }

    // 核心点击逻辑（支持同类型切换不惩罚）
    function onCardClick(e) {
        const targetEl = e.target.closest('.card');
        if (!targetEl) return;
        if (!gameActive) {
            messageBox.innerHTML = "⚠️ กรุณากดปุ่มเริ่มเกมก่อน / 请先点击开始游戏 ⚠️";
            setTimeout(() => {
                if (!gameActive && messageBox) messageBox.innerHTML = "✨ กดปุ่มเริ่มเกม เพื่อเริ่มจับคู่! ✨";
            }, 1500);
            return;
        }
        if (targetEl.classList.contains('removed')) return;

        const cardType = targetEl.getAttribute('data-type');
        const wordId = parseInt(targetEl.getAttribute('data-id'));

        // 情况1：没有选中任何卡片
        if (selectedCard === null) {
            clearSelected();
            selectedCard = targetEl;
            selectedCardType = cardType;
            selectedWordId = wordId;
            targetEl.classList.add('selected');
            return;
        }

        // 情况2：已有选中的卡片
        const firstCard = selectedCard;
        const firstType = selectedCardType;
        const firstId = selectedWordId;
        const secondCard = targetEl;
        const secondType = cardType;
        const secondId = wordId;

        // 如果点击的是同一个卡片，取消选中
        if (firstCard === secondCard) {
            clearSelected();
            return;
        }

        // 如果类型相同（都是中文或都是泰语）→ 切换选中，不惩罚
        if (firstType === secondType) {
            clearSelected();                // 取消之前的选中
            selectedCard = secondCard;      // 选中新卡片
            selectedCardType = secondType;
            selectedWordId = secondId;
            secondCard.classList.add('selected');
            return;
        }

        // 类型不同：进行配对判断
        const isValidMatch = (firstId === secondId);
        if (isValidMatch) {
            handleMatch(firstCard, secondCard, firstId);
            clearSelected();
        } else {
            showCrossAndShake(secondCard);  // 配对失败，第二个卡片震动+红叉
            clearSelected();                // 清空选中状态
        }
    }

    // 重置并构建卡片（不激活游戏）
    function resetAndBuildGame() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        gameActive = false;
        currentScore = 0;
        pairedCount = 0;
        timeLeft = initialTime;
        timerDisplaySpan.innerText = timeLeft;
        updateScoreDisplay();
        clearSelected();

        chineseGrid.innerHTML = '';
        thaiGrid.innerHTML = '';

        // 中文卡片（固定顺序）
        WORDS.forEach(word => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-type', 'chinese');
            card.setAttribute('data-id', word.id);
            card.innerHTML = `<div style="font-size:1.5rem; font-weight:bold;">${word.chinese}</div><div style="font-size:0.8rem; margin-top:5px; color:#a5672f;">🇨🇳</div>`;
            chineseGrid.appendChild(card);
        });

        // 泰语卡片（随机打乱）
        const shuffled = [...WORDS];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        shuffled.forEach(word => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-type', 'thai');
            card.setAttribute('data-id', word.id);
            card.innerHTML = `<div style="font-size:1.4rem; font-weight:bold;">${word.thai}</div><div style="font-size:0.7rem; margin-top:4px;">🇹🇭</div>`;
            thaiGrid.appendChild(card);
        });

        // 绑定点击事件
        [chineseGrid, thaiGrid].forEach(grid => {
            grid.removeEventListener('click', onCardClick);
            grid.addEventListener('click', onCardClick);
        });

        messageBox.innerHTML = "🐼 กดเริ่มเกม! จับคู่คำศัพท์ให้ถูกต้อง 🐼";
    }

    function startTimerAndActivate() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            if (timeLeft <= 1) {
                clearInterval(timerInterval);
                timerInterval = null;
                gameActive = false;
                timeLeft = 0;
                timerDisplaySpan.innerText = "0";
                messageBox.innerHTML = "⏰ เวลาหมด! เกมจบแล้ว / 时间到！游戏结束 ⏰";
                clearSelected();
            } else {
                timeLeft--;
                timerDisplaySpan.innerText = timeLeft;
            }
        }, 1000);
    }

    // 开始新游戏（由按钮触发）
    function startNewGame() {
        // 重置游戏状态
        if (timerInterval) clearInterval(timerInterval);
        resetAndBuildGame();
        gameActive = true;
        pairedCount = 0;
        currentScore = 0;
        timeLeft = initialTime;
        timerDisplaySpan.innerText = timeLeft;
        updateScoreDisplay();
        clearSelected();
        startTimerAndActivate();
        messageBox.innerHTML = "🎋 เกมเริ่ม! จับคู่ให้ถูกต้อง / 游戏开始！🎋";
        
        // 播放背景音乐（如果尚未开始）
        startBackgroundMusic();
        
        // 确保音频上下文已激活（用于配对音效）
        if (!audioEnabled) enableAudio();
    }

    // ---------- 初始化 ----------
    function init() {
        initAudioFiles();      // 加载背景音乐和胜利语音
        resetAndBuildGame();   // 构建卡片但不激活游戏
        gameActive = false;
        messageBox.innerHTML = "🐼 กดปุ่ม 'เริ่มเกม' เพื่อเล่น! 🐼";
        
        // 绑定开始按钮
        startBtn.addEventListener('click', startNewGame);
        
        // 预激活音频（用于配对音效，需要用户首次点击页面任意位置）
        document.body.addEventListener('click', function initAudioOnce() {
            if (!audioEnabled) enableAudio();
        }, { once: true });
    }

    init();
</script>
</body>
</html>
